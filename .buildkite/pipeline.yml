steps:
  - label: run bats tests
    plugins:
      - plugin-tester#v1.1.1: ~

  - label: run skip-build-for-commit
    plugins:
      - skip-build-for-commi#pre-checkout:
          files:
            - hooks/*
            - buildkite/*.sh

  - label: ":sparkles: lint"
    plugins:
      - plugin-linter#v3.3.0:
          id: skip-build-for-commit

